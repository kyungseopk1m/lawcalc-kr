name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-draft-release:
    name: Create tag-anchored draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping create."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --target "$SHA" \
              --title "lawcalc-kr $TAG" \
              --notes "TBD — body populated by tauri-action and finalized via gh release edit before publish."
          fi

  publish-tauri:
    needs: create-draft-release
    name: Build Tauri app (${{ matrix.platform }})
    # W4 dry-run prep: create a temporary v* tag and verify draft artifacts on
    # macOS and Windows before publishing a user-facing release.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Tauri artifacts
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: lawcalc-kr ${{ github.ref_name }}
          releaseBody: |
            # lawcalc-kr ${{ github.ref_name }}

            한국 법률 계산 데스크톱 워크벤치 ${{ github.ref_name }} 릴리스입니다.

            자세한 변경 내역은 [CHANGELOG.md](https://github.com/kyungseopk1m/lawcalc-kr/blob/${{ github.ref_name }}/CHANGELOG.md) 의 해당 버전 섹션을 참고해 주세요. 본 draft 의 본문은 publish 전에 GitHub UI 또는 `gh release edit` 으로 변경 내역을 보강해 사용합니다.

            ## 다운로드

            - **macOS**: `.dmg` 설치 파일을 내려받아 Applications 폴더로 옮긴 뒤 실행합니다. 아직 Apple notarization 을 진행하지 않아 Gatekeeper 경고가 표시될 수 있습니다 — Finder 에서 **Control-클릭 → 열기** 또는 **시스템 설정 → 개인정보 보호 및 보안** 에서 허용해 주세요.
            - **Windows**: `setup.exe` 를 내려받아 설치 마법사를 따릅니다. 기관/관리자 배포가 필요한 경우 `.msi` 를 사용할 수 있습니다. SmartScreen 의 "게시자 확인 안 됨" 경고는 **추가 정보 → 실행** 으로 진행합니다.
            - `latest.json`, `.sig`, `.app.tar.gz` 는 인앱 자동업데이트 검증용 자산이므로 일반 사용자가 직접 내려받을 필요는 없습니다.

            ## 자동업데이트 / 호환성

            - 인앱 자동업데이트 (`tauri-plugin-updater` + minisign signature 검증) 가 v0.2.x 이후 사용자에게 새 버전을 안내합니다. 미저장 변경사항이 있을 때 재시작을 막고 저장 후 진행하도록 안내합니다.
            - `.lcalc` 파일은 현행 v3 envelope (`schemaVersion: "3"`, `envelopeFeatures`, `dataVersions`) 을 사용합니다. v0.1.x 의 v1 / v0.2.x 의 v2 파일은 불러올 때 자동으로 v3 으로 마이그레이션됩니다 (한 방향).

            ## 면책

            본 결과는 검토용 계산이며, 사건별 특수성은 전문가 확인이 필요합니다. 자세한 출처 / 무관성 명시: [LEGAL_REFERENCES.md](https://github.com/kyungseopk1m/lawcalc-kr/blob/main/docs/LEGAL_REFERENCES.md)

            ## 라이선스

            AGPL-3.0-or-later. 자세한 내용은 [LICENSE](https://github.com/kyungseopk1m/lawcalc-kr/blob/main/LICENSE) 를 확인하세요.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  patch-release-tag:
    name: Patch release tag_name metadata
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Patch release record tag_name (safeguard against tauri-action draft URL stuck on untagged-*)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          RELEASE_ID=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)
          if [ -z "$RELEASE_ID" ]; then
            echo "Release $TAG not found; cannot patch tag_name."
            exit 1
          fi
          gh api --method PATCH \
            "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -f tag_name="$TAG"

  update-readme:
    name: Update README download URLs
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite README direct download URLs to ${{ github.ref_name }}
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          sed -i -E "s|releases/download/v[0-9]+\.[0-9]+\.[0-9]+/LawCalc\.Korea_[0-9]+\.[0-9]+\.[0-9]+_universal\.dmg|releases/download/${TAG}/LawCalc.Korea_${VERSION}_universal.dmg|g" README.md
          sed -i -E "s|releases/download/v[0-9]+\.[0-9]+\.[0-9]+/LawCalc\.Korea_[0-9]+\.[0-9]+\.[0-9]+_x64-setup\.exe|releases/download/${TAG}/LawCalc.Korea_${VERSION}_x64-setup.exe|g" README.md

      - name: Commit and push README update
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if git diff --quiet README.md; then
            echo "README already references ${TAG}, no update needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): bump download URLs to ${TAG}"
          git push origin main
