name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build Tauri app (${{ matrix.platform }})
    # W4 dry-run prep: create a temporary v* tag and verify draft artifacts on
    # macOS and Windows before publishing a user-facing release.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Tauri artifacts
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: lawcalc-kr ${{ github.ref_name }}
          releaseBody: |
            # lawcalc-kr ${{ github.ref_name }}

            한국 판결금 이자·지연손해금 계산 데스크톱 워크벤치 릴리스입니다.

            ## 다운로드

            - macOS: 일반 사용자는 `.dmg` 설치 파일을 내려받아 설치합니다. 아직 Apple notarization을 진행하지 않았으므로 처음 실행할 때 Gatekeeper 경고가 표시될 수 있습니다.
            - Windows: 일반 사용자는 `setup.exe` 설치 파일을 내려받아 실행합니다. 기관/관리자 배포가 필요한 경우 `.msi` 설치 파일을 사용할 수 있습니다.
            - `latest.json`, `.sig`, `.app.tar.gz` 파일은 인앱 자동업데이트 검증용 자산이므로 일반 사용자가 직접 내려받을 필요는 없습니다.

            ## 주요 기능

            - 인앱 자동업데이트: `tauri-plugin-updater` 기반으로 새 버전 확인, 다운로드 진행률, 설치 후 재시작 흐름을 제공합니다.
            - `.lcalc` 미저장 변경사항이 있으면 업데이트 재시작을 막고 저장 후 진행하도록 안내합니다.
            - interest-limits/v1 dataset: 이자제한법 제한이율 변경 이력 4개 구간을 버전 관리 데이터로 포함했습니다.
            - interest 엔진 shared helper 추출: 이자 계산 공통 로직을 내부 helper 로 정리했습니다. 사용자-facing 계산 결과 변경은 없습니다.
            - 원금, 기간, 법정이율 프리셋, 초일 산입, 윤년 처리 옵션 기반 이자 계산
            - 민법·상법·소송촉진 등에 관한 특례법 이율 변경 이력 반영
            - 구간별 일수, 이율, 공식, 이자와 총액 표시
            - 상속분 간이 계산 탭 (`Inheritance.hwp` 매뉴얼 기반, 8 골든 케이스)
            - `.lcalc` v2 envelope (`{ schemaVersion: "2", kind, payload }`) 로 다중 도메인 저장·로드. v1 (interest 단일) 파일은 자동 마이그레이션
            - PDF(A4, 한글 Pretendard 폰트 임베드) / CSV(UTF-8 BOM, Excel 한글 호환, formula injection 방어) / 클립보드 텍스트 내보내기
            - `.lcalc` 1 MiB 상한 + 비고 10,000 자 상한
            - toast 오류 메시지의 절대 경로·사용자 계정명·스택 프레임 redact
            - CI `prettier --check` + `tsc --noEmit` + `cargo fmt --check` + `cargo clippy -- -D warnings` 게이트
            - 5개 export/save/load 버튼 (PDF / CSV / 클립보드 / `.lcalc` 저장 / `.lcalc` 불러오기) 의 macOS·Windows main thread deadlock 해소

            ## 호환성

            - `.lcalc` v1 (`schemaVersion: "1"`) 파일은 불러올 때 v2 envelope 로 자동 마이그레이션됩니다.
            - v0.2.x 에서 저장한 v2 envelope 파일은 v0.1.x 앱에서 열리지 않습니다.

            ## 라이선스

            - AGPL-3.0-or-later 라이선스로 배포됩니다.

            ## 면책

            이 계산 결과는 검토용이며 법률 자문이 아닙니다. 사건별 특수성은 변호사 등 전문가 확인이 필요합니다. 자세한 출처 / 무관성 명시: [LEGAL_REFERENCES.md](https://github.com/kyungseopk1m/lawcalc-kr/blob/main/docs/LEGAL_REFERENCES.md)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  update-readme:
    name: Update README download URLs
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite README direct download URLs to ${{ github.ref_name }}
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          sed -i -E "s|releases/download/v[0-9]+\.[0-9]+\.[0-9]+/LawCalc\.Korea_[0-9]+\.[0-9]+\.[0-9]+_universal\.dmg|releases/download/${TAG}/LawCalc.Korea_${VERSION}_universal.dmg|g" README.md
          sed -i -E "s|releases/download/v[0-9]+\.[0-9]+\.[0-9]+/LawCalc\.Korea_[0-9]+\.[0-9]+\.[0-9]+_x64-setup\.exe|releases/download/${TAG}/LawCalc.Korea_${VERSION}_x64-setup.exe|g" README.md

      - name: Commit and push README update
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if git diff --quiet README.md; then
            echo "README already references ${TAG}, no update needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): bump download URLs to ${TAG}"
          git push origin main
